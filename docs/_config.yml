title: Open Worship
description: Free, open-source church presentation software for worship lyrics
url: https://inno8.github.io
baseurl: /openworship

remote_theme: just-the-docs/just-the-docs

color_scheme: dark

logo: /openworship/assets/images/logo.png
favicon_ico: /openworship/assets/images/logo.png

search_enabled: true
search:
  heading_level: 2
  previews: 3

aux_links:
  "Download":
    - "https://github.com/inno8/open-worship/releases"
  "Read the Docs":
    - "/openworship/getting-started"

aux_links_new_tab: true

footer_content: "Made with ❤️ for churches everywhere. MIT License."

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/inno8/openworship"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

callouts:
  highlight:
    color: purple
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: yellow
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

defaults:
  - scope:
      path: ""
    values:
      layout: default
