<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Screen/display area -->
  <rect x="96" y="120" width="320" height="240" rx="16" fill="#1e1b4b" opacity="0.9"/>
  
  <!-- Lyrics lines - modern pill shapes -->
  <rect x="136" y="160" width="240" height="24" rx="12" fill="#ffffff"/>
  <rect x="156" y="200" width="200" height="24" rx="12" fill="#ffffff" opacity="0.7"/>
  <rect x="176" y="240" width="160" height="24" rx="12" fill="#ffffff" opacity="0.5"/>
  <rect x="156" y="280" width="200" height="24" rx="12" fill="#ffffff" opacity="0.3"/>
  
  <!-- Play/live indicator -->
  <circle cx="256" cy="400" r="24" fill="url(#accentGradient)"/>
  <polygon points="250,392 250,408 264,400" fill="#ffffff"/>
</svg>
